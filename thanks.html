<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — Arkonyk</title>
<meta name="description" content="Thanks for your interest in Arkonyk. We'll be in touch soon.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=4">
<link rel="icon" href="favicon.svg">
<style>
  .thanks-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    background: radial-gradient(900px 600px at 70% -10%, rgba(25,227,227,.10), transparent 60%), var(--bg);
  }
  .thanks-card { max-width: 540px; }
  .thanks-card img.mark { height: 64px; width: auto; display: block; margin: 0 auto 30px; }
  .thanks-card .gate-divider { justify-content: center; margin: 0 auto 22px; max-width: 220px; }
  .thanks-card h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); color: var(--heading); margin: 0 0 16px; }
  .thanks-card p { color: var(--text-soft); line-height: 1.7; font-size: .98rem; margin: 0 0 28px; }
  .thanks-card .accent { color: var(--accent); }
</style>
</head>
<body>
<div class="thanks-wrap">
  <div class="thanks-card">
    <img class="mark" src="logo-horizontal-white.svg" alt="Arkonyk">
    <div class="gate-divider"><span>Thank you</span></div>
    <h1>Message received</h1>
    <p>Thanks for reaching out to Arkonyk. We've received your details and will be in touch soon. A confirmation is on its way to your inbox.</p>
    <p class="accent">Truth in Payments.</p>
    <a class="btn btn-outline" href="index.html">Back to Arkonyk</a>
  </div>
</div>
</body>
</html>
